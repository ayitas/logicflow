<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LogicFlow — A high-performance algorithm visualizer for backend engineers. Visualize and compare sorting and searching algorithms in real-time.">
    <title>LogicFlow — Algorithm Visualizer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- D3.js v7 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header id="app-header">
        <div class="header-content">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="18" width="6" height="12" rx="1.5" fill="url(#grad1)"/>
                    <rect x="10" y="10" width="6" height="20" rx="1.5" fill="url(#grad2)"/>
                    <rect x="18" y="4" width="6" height="26" rx="1.5" fill="url(#grad3)"/>
                    <rect x="26" y="14" width="4" height="16" rx="1.5" fill="url(#grad4)"/>
                    <defs>
                        <linearGradient id="grad1" x1="5" y1="18" x2="5" y2="30" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                        <linearGradient id="grad2" x1="13" y1="10" x2="13" y2="30" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#a78bfa"/>
                        </linearGradient>
                        <linearGradient id="grad3" x1="21" y1="4" x2="21" y2="30" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#a78bfa"/><stop offset="1" stop-color="#c4b5fd"/>
                        </linearGradient>
                        <linearGradient id="grad4" x1="28" y1="14" x2="28" y2="30" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#c4b5fd"/><stop offset="1" stop-color="#ddd6fe"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>LogicFlow</h1>
            </div>
            <p class="tagline">Algorithm Visualizer</p>
        </div>
    </header>

    <main id="app-main">

        <!-- Controls Panel -->
        <section id="controls-panel" class="glass-card">
            <div class="controls-grid">
                <div class="control-group">
                    <label for="algorithm-select">Algorithm</label>
                    <select id="algorithm-select">
                        <option value="" disabled selected>Loading...</option>
                    </select>
                </div>

                <div class="control-group" id="target-group" style="display: none;">
                    <label for="target-input">Search Target</label>
                    <input type="number" id="target-input" placeholder="Enter value to find..." min="1" max="99">
                </div>

                <div class="control-group">
                    <label for="array-size-slider">Array Size: <span id="array-size-value">30</span></label>
                    <input type="range" id="array-size-slider" min="5" max="100" value="30">
                </div>

                <div class="control-group">
                    <label for="speed-slider">Speed: <span id="speed-value">50ms</span></label>
                    <input type="range" id="speed-slider" min="1" max="200" value="50">
                </div>

                <div class="control-group control-buttons">
                    <button id="btn-generate" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35a1 1 0 0 0-1.3 0L11 3.7V2a1 1 0 0 0-2 0v4a1 1 0 0 0 1 1h4a1 1 0 0 0 0-2h-1.7l1.35-1.35a1 1 0 0 0 0-1.3zM5 9H1a1 1 0 0 0 0 2h1.7l-1.35 1.35a1 1 0 1 0 1.3 1.3L4 12.3V14a1 1 0 0 0 2 0v-4a1 1 0 0 0-1-1z" fill="currentColor"/></svg>
                        Generate
                    </button>
                    <button id="btn-start" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2.5v11l9-5.5z" fill="currentColor"/></svg>
                        Start
                    </button>
                    <button id="btn-stop" class="btn btn-danger" disabled>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="10" height="10" rx="1" fill="currentColor"/></svg>
                        Stop
                    </button>
                </div>
            </div>
        </section>

        <!-- Algorithm Description -->
        <section id="algo-description" class="glass-card">
            <div class="algo-desc-header">
                <span id="algo-category-badge" class="category-badge">sorting</span>
                <p id="algo-desc-text">Select an algorithm to see its description.</p>
            </div>
        </section>

        <!-- Search Result Banner (hidden by default) -->
        <section id="search-result" class="glass-card" style="display: none;">
            <div class="search-result-content">
                <span id="search-result-icon"></span>
                <span id="search-result-text"></span>
            </div>
        </section>

        <!-- Visualization Area -->
        <section id="visualization" class="glass-card">
            <div id="svg-container">
                <svg id="viz-svg"></svg>
            </div>
            <div id="step-indicator">
                <span id="step-current">0</span> / <span id="step-total">0</span> steps
            </div>
        </section>

        <!-- Metrics Panel -->
        <section id="metrics-panel">
            <div class="metric-card glass-card" id="metric-comparisons">
                <div class="metric-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 7l4-4 4 4M8 17l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="metric-info">
                    <span class="metric-value" id="val-comparisons">0</span>
                    <span class="metric-label">Comparisons</span>
                </div>
            </div>

            <div class="metric-card glass-card" id="metric-operations">
                <div class="metric-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="metric-info">
                    <span class="metric-value" id="val-operations">0</span>
                    <span class="metric-label" id="operations-label">Swaps / Moves</span>
                </div>
            </div>

            <div class="metric-card glass-card" id="metric-complexity">
                <div class="metric-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="metric-info">
                    <span class="metric-value" id="val-complexity">—</span>
                    <span class="metric-label">Time Complexity</span>
                </div>
            </div>

            <div class="metric-card glass-card" id="metric-time">
                <div class="metric-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <div class="metric-info">
                    <span class="metric-value" id="val-time">—</span>
                    <span class="metric-label">Server Time</span>
                </div>
            </div>
        </section>

        <!-- Legend -->
        <section id="legend" class="glass-card">
            <h3>Legend</h3>
            <div class="legend-items" id="legend-items">
                <!-- Populated dynamically by JS based on category -->
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer id="app-footer">
        <p>LogicFlow &copy; 2026 — Built with Go + D3.js</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
